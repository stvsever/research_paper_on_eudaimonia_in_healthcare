version: "3.9"

services:
  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../src/v2/outputs:/app/src/v2/outputs
      - ../src/v2/figures:/app/src/v2/figures
      - ../src/v1/outputs:/app/src/v1/outputs
    command: ["python", "src/v2/run_pipeline.py"]
